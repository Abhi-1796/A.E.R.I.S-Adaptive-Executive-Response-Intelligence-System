services:
  mysql:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aeris_db
    ports:
      - "3307:3306"

  aeris:
    image: aeris-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/aeris_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      GEMINI_API_KEY: AIzaSyC1s0gGKVOlBl66hzbE5bqYM-jMUPeGBDg
    depends_on:
      - mysql