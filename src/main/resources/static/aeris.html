<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIS – AI Assistant</title>

    <style>
        :root {
            --bg: #0d0d0d;
            --panel: #141414;
            --accent: #3f3f46;
            --user: #2f2f2f;
            --ai: #1a1a1a;
            --text: #e5e5e5;
            --muted: #a1a1aa;
            --border: #262626;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", system-ui, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* MAIN APP */
        .app {
            width: 100%;
            max-width: 900px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--panel);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        /* HEADER */
      .header {
       display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    padding: 10px;
    border-bottom: 1px solid var(--border);
}

<!--.header-content {-->
<!--    display: flex;-->
<!--    align-items: center;-->
<!--    justify-content: center;-->
<!--    gap: 10px;-->
<!--}-->

.logo {
    width: 50px;
    height: auto;
}

.title {
    font-family: sans-serif;
    font-weight: bold;
    font-size: 1.2rem;
}

        /* CHAT AREA */
        .chat {
            flex: 1;
            padding: 14px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* MESSAGE BUBBLES */
        .msg {
            max-width: 80%;
            padding: 9px 13px;
            border-radius: 12px;
            font-size: 13.5px;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg.user {
            align-self: flex-end;
            background: var(--user);
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        .msg.ai {
            align-self: flex-start;
            background: var(--ai);
            border: 1px solid var(--border);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        /* INPUT AREA */
        .input-bar {
            display: flex;
            gap: 8px;
            padding: 10px;
            border-top: 1px solid var(--border);
            background: #0f0f0f;
        }

        .input-bar input {
            flex: 1;
            background: #0b0b0b;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            font-size: 14px;
            border-radius: 8px;
        }

        .input-bar input::placeholder {
            color: #737373;
        }

        .input-bar button {
            background: #27272a;
            color: #e5e5e5;
            border: 1px solid var(--border);
            padding: 0 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .input-bar button:hover {
            background: #3f3f46;
        }

        .input-bar button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 600px) {
            .app {
                border: none;
            }
            .msg {
                max-width: 92%;
                font-size: 13px;
            }
        }
    </style>

</head>

<body>

<div class="app">
    <div class="header">
        <img src="aeris-logo.png" alt="AERIS Logo" class="logo">
        <span class="title">A.E.R.I.S-Adaptive Executive Response & Intelligence System</span>
        </div>

    <div id="chat" class="chat">
        <div class="msg ai">Hello 👋 I am AERIS. How can I help you today?</div>
    </div>

    <div class="input-bar">
        <input id="input" placeholder="Type your message…" />
        <button id="sendBtn" onclick="send()">Send</button>
    </div>
</div>

<script>
    function send() {
        const input = document.getElementById("input");
        const btn = document.getElementById("sendBtn");
        const chat = document.getElementById("chat");

        const text = input.value.trim();
        if (!text) return;

        // User message
        chat.innerHTML += `<div class="msg user">${text}</div>`;
        chat.scrollTop = chat.scrollHeight;
        input.value = "";
        btn.disabled = true;

        fetch("/api/aeris/command", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ command: text })
        })
        .then(res => res.text())
        .then(reply => {
            chat.innerHTML += `<div class="msg ai">${reply}</div>`;
            chat.scrollTop = chat.scrollHeight;
            btn.disabled = false;
        })
        .catch(() => {
            chat.innerHTML += `<div class="msg ai">AI service unavailable.</div>`;
            btn.disabled = false;
        });
    }

    // Enter key support
    document.getElementById("input").addEventListener("keydown", e => {
        if (e.key === "Enter") send();
    });
</script>

</body>
</html>
